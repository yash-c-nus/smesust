<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SME Sustainability Framework</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-inner">
        <div class="header-left">
            <div class="logo">◆</div>
            <span class="header-title">SME Sustainability Framework</span>
        </div>
        <div class="header-right">
            <span class="completed-badge" id="completedBadge">0/33 Completed</span>
        </div>
    </div>
    <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressBarFill"></div>
    </div>
</header>

<!-- Section Pills -->
<div class="pills-bar">
    <div class="pills-inner" id="sectionPills"></div>
</div>

<!-- Horizontal Slide Container -->
<div class="slider-viewport">
    <div class="slider-track" id="sliderTrack"></div>
</div>

<!-- Floating Nav -->
<button class="fab" id="fabBtn">☰</button>
<div class="fab-panel" id="fabPanel">
    <div class="fab-panel-title">Navigate</div>
    <div id="fabNav"></div>
</div>

<footer class="footer">
    <p>SME Sustainability Scorecard — Built for impact-driven businesses</p>
</footer>

<script src="script.js"></script>
</body>
</html>
